---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Get files in code dir
      ansible.builtin.find:
        paths: /local-share/
        file_type: directory
      register: fetched_projects

    - name: Create list of paths in conde dir
      ansible.builtin.set_fact:
        found_code_repos: "{{ fetched_projects.files | map(attribute='path') | list }}"

    - name: Get files in kernel dir
      ansible.builtin.find:
        paths: /usr/local/share/jupyter/kernels
        file_type: directory
      register: kernels

    - name: Create list of installed kernels
      ansible.builtin.set_fact:
        found_kernels: "{{ kernels.files | map(attribute='path') | list }}"

    - name: Assertions
      ansible.builtin.assert:
        that:
          - "'doi10.7910DVNOWVFCE' in found_code_repos"
          - "'requirements.git' in found_code_repos"
          - "'conda.git' in found_code_repos"
          - "'demo-julia.git' in found_code_repos"
          - "'zenodo-1211089' in found_code_repos"
          - "'python-requirements' in found_kernels"
          - "'python-conda' in found_kernels"
          - "'julia-demo-julia-1.12' in found_kernels"
          - "'python-v3.13' in found_kernels"
          - "'r-v4.5.1' in found_kernels"
